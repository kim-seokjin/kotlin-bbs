name: CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Docker image build and save
        run: |
          docker build -t kotlin-bbs:latest .
          docker save kotlin-bbs:latest | gzip > kotlin-bbs.tar.gz

      - name: Upload Docker image to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "kotlin-bbs.tar.gz"
          target: "/home/${{ secrets.EC2_USER }}/"

      - name: Restart docker container
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USER }}
            docker load < kotlin-bbs.tar.gz
            docker stop kotlin-bbs || true
            docker rm kotlin-bbs || true
            docker run -d --name kotlin-bbs\
              --network host \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e DB_PASSWORD=${{ secrets.MYSQL_USER_PASSWORD }} \
              kotlin-bbs:latest